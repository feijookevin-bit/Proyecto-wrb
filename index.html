<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuestra historia de pollitos juntos 🐥❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #0e0e0e;
      color: #f2f2f2;
      text-align: center;
      overflow-x: hidden;
    }

    header {
      padding: 60px 20px;
      background: linear-gradient(180deg, #0e0e0e, #1a1a1a);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3.4em;
      color: #ff6b81;
      text-shadow: 0 0 20px rgba(255, 107, 129, 0.5);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: #ccc;
      letter-spacing: 3px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #161616;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 0 20px rgba(255,107,129,0.1);
      animation: fadeUp 1.2s ease;
    }

    .contador {
      color: #ffb3c1;
    }

    .texto {
      line-height: 1.7;
      color: #e0e0e0;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .galeria img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 10px;
      transition: transform 0.3s;
      cursor: pointer;
      animation: fadeIn 1s ease;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    footer {
      margin: 40px 0;
      color: #888;
    }

    @keyframes fadeIn {
      from {opacity:0;}
      to {opacity:1;}
    }

    @keyframes fadeUp {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <h1>Nuestra historia de pollitos juntos 🐥❤️</h1>
  <h2>Kevin & Katherine</h2>
</header>

<div class="container">

  <div class="card">
    <h3>⏳ Nuestro tiempo juntos</h3>
    <div class="contador" id="contador"></div>
  </div>

  <div class="card">
    <h3>💌 Nuestra historia</h3>
    <p class="texto">
      Este espacio es solo para nosotros, para dejar plasmada nuestra historia...
      <br><br>
      Eres una de las cosas más lindas de mi vida 🐥❤️
    </p>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>

</div>

<footer>
  Hecho con amor para mi pollito 🐥❤️
</footer>

<!-- Modal -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">
  <img id="modalImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<!-- Música -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusica()" style="position:fixed; bottom:20px; right:20px; background:#ff6b81; border:none; padding:10px 15px; border-radius:20px; color:white;">
  🎶
</button>

<script>
/* contador */
const fechaInicio = new Date("2025-10-13T00:00:00");

function actualizarContador() {
  const ahora = new Date();
  const diff = ahora - fechaInicio;

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff/(1000*60*60))%24);
  const min = Math.floor((diff/(1000*60))%60);
  const seg = Math.floor((diff/1000)%60);

  document.getElementById("contador").innerHTML =
    `${dias} días, ${horas} horas, ${min} minutos y ${seg} segundos 💖`;
}

setInterval(actualizarContador,1000);
actualizarContador();

/* música */
const musica = document.getElementById("musica");
let sonando = false;

function toggleMusica(){
  if(sonando){ musica.pause(); }
  else{ musica.play(); }
  sonando = !sonando;
}

/* galería automática */
fetch('https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos')
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById('galeria');

  data.forEach(file=>{
    if(file.type==="file"){
      const img = document.createElement('img');
      img.src = file.download_url;

      img.onclick = ()=>{
        document.getElementById("modal").style.display="flex";
        document.getElementById("modalImg").src=img.src;
      };

      galeria.appendChild(img);
    }
  });
});

/* cerrar modal */
document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").style.display="none";
};

/* corazones */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.innerHTML="💖";
  heart.style.position="fixed";
  heart.style.left=Math.random()*100+"vw";
  heart.style.bottom="0";
  heart.style.fontSize="20px";
  heart.style.animation="subir 4s linear";

  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
},500);

</script>

<style>
@keyframes subir{
  from{transform:translateY(0); opacity:1;}
  to{transform:translateY(-100vh); opacity:0;}
}
</style>

</body>
</html>
