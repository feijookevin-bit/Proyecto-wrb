<!DOCTYPE html>  
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<title>Nuestra historia 🐥❤️</title>  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
  
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">  
  
<style>  
body {  
  margin: 0;  
  font-family: 'Great Vibes', cursive;  
  font-size: 20px;  
  background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);  
  color: #ff6b81;  
  text-align: center;  
  overflow-x: hidden;  
}  
  
body.loading #main-content {  
  opacity: 0;  
  pointer-events: none;  
  transition: opacity 1s ease;  
}  
  
#video-bg {  
  position: fixed;  
  width:100%;  
  height:100%;  
  object-fit: cover;  
  z-index:-2;  
  opacity:0.2;  
  filter: blur(2px);  
}  
  
.titulo-principal { font-size:3.5em; }  
.subtitulo { font-size:2.3em; }  
  
#nombre {  
  opacity: 0;  
  transform: scale(0.5);  
  filter: blur(10px);  
}  
  
#nombre.aparecer {  
  animation: aparecerNombre 2s forwards;  
}  
  
@keyframes aparecerNombre {  
  0% {opacity:0; transform:scale(0.5); filter:blur(10px);}  
  50% {opacity:1; transform:scale(1.2); filter:blur(0);}  
  100% {transform:scale(1);}  
}  
  
.container { max-width:900px; margin:auto; padding:20px; }  
.card {  
  background:#141414;  
  border-radius:16px;  
  padding:20px;  
  margin:20px 0;  
}  
  
.galeria {  
  display:grid;  
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));  
  gap:10px;  
}  
  
.galeria img {  
  width:100%;  
  height:140px;  
  object-fit:cover;  
  border-radius:12px;  
  cursor:pointer;  
  transition:.4s;  
}  
  
.galeria img:hover {  
  transform:scale(1.1);  
  box-shadow:0 0 20px rgba(255,107,129,0.8);  
}  

/* MENSAJES */
.mensaje {
  grid-column:1/-1;
  font-size:1.4em;
  color:#ffb3c1;
  margin:10px 0;
}
  
.star-bg {  
  position:fixed;  
  color:white;  
  opacity:0.2;  
  pointer-events:none;  
  animation:floatBg linear infinite;  
}  
  
@keyframes floatBg {  
  0%{transform:translate(0,0);}  
  100%{transform:translate(var(--x),var(--y));}  
}  
  
#modal {  
  display:none;  
  position:fixed;  
  width:100%;  
  height:100%;  
  background:rgba(0,0,0,0.4);  
  backdrop-filter: blur(10px);  
  justify-content:center;  
  align-items:center;  
  z-index:9999;  
}  
  
#modal img {  
  max-width:90%;  
  max-height:90%;  
  border-radius:12px;  
}  
  
#finalText { font-size:1.8em; margin-top:30px; }  
  
/* SOBRE */
#sobre {
  position: relative;
  width: 280px;
  height: 180px;
  margin: 50px auto;
  perspective: 1000px;
}

#sobre::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:#ff6b81;
  border-radius:10px;
  box-shadow:0 0 25px rgba(255,107,129,0.5);
}

#btnSobre {
  position:absolute;
  top:-40px;
  left:50%;
  transform:translateX(-50%);
  background:#ff6b81;
  color:white;
  padding:8px 18px;
  border-radius:20px;
  cursor:pointer;
  font-size:1em;
  box-shadow:0 0 10px rgba(255,107,129,0.6);
  animation:latido 1.5s infinite;
  z-index:3;
}

.tapa {
  position:absolute;
  width:100%;
  height:100%;
  background:#ff4d6d;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:1s;
  z-index:2;
}

.carta {
  position:absolute;
  width:90%;
  height:90%;
  top:5%;
  left:5%;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  padding:15px;
  box-sizing:border-box;
  transform:translateY(40px);
  opacity:0;
  transition:1s;
  backdrop-filter:blur(10px);
}

#cartaTexto {
  font-size:1.2em;
  color:#ffdce3;
  line-height:1.6;
}

#sobre.abierto .tapa {
  transform:rotateX(180deg);
}

#sobre.abierto .carta {
  transform:translateY(0);
  opacity:1;
}

#pollito {
  width:120px;
  animation:latido 1.5s infinite;
}

@keyframes latido {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

#introText {
  font-size:2em;
  color:white;
}
</style>  
</head>  
  
<body class="loading">  
  
<div id="intro"><h1 id="introText"></h1></div>  
  
<div id="main-content">  
  
<video autoplay loop muted id="video-bg">  
  <source src="viento.mp4" type="video/mp4">  
</video>  
  
<header>  
  <h1 class="titulo-principal">Nuestra historia</h1>  
  <h2 class="subtitulo" id="nombre">✨ Katherine ✨</h2>  
</header>  
  
<div class="container">  
  <div class="card">  
    <h3>📸 Nuestros recuerdos</h3>  
    <div class="galeria" id="galeria"></div>  
  </div>  
</div>  
  
<footer>  
  <div id="finalText"></div>  

  <div id="sobre">
    <div id="btnSobre">Tócame 💖</div>
    <div class="tapa"></div>
    <div class="carta">
      <p id="cartaTexto"></p>
    </div>
  </div>

  <img id="pollito" src="fotos/pollito.png">  
</footer>  
  
<div id="modal"><img id="modalImg"></div>  
</div>  
  
<script>  

/* MENSAJES PERSONALIZADOS */
const mensajes = [
"Ese día contigo… lo repetiría mil veces",
"No sé cómo haces pero siempre me arreglas el día",
"Aquí fue donde pensé: uff… me gusta demasiado",
"Contigo todo se siente más fácil",
"Esta foto me da paz… por ti",
"No es la foto… eres tú en ella",
"Literal, mi lugar favorito eres tú",
"Siempre termino sonriendo cuando veo esto",
"Aquí ya estaba bien perdido por ti 😌",
"Me haces falta incluso cuando estás cerquita"
];

/* GALERÍA + MENSAJES AUTOMÁTICOS */
const galeria = document.getElementById("galeria");

/* 👉 SOLO EDITAS TUS FOTOS AQUÍ */
const fotos = [
"fotos/1.jpg",
"fotos/2.jpg",
"fotos/3.jpg",
"fotos/4.jpg",
"fotos/5.jpg",
"fotos/6.jpg",
"fotos/7.jpg",
"fotos/8.jpg",
"fotos/9.jpg"
];

fotos.forEach((src, index) => {
  const img = document.createElement("img");
  img.src = src;
  galeria.appendChild(img);

  /* cada 6 fotos */
  if ((index + 1) % 6 === 0) {
    const mensajeIndex = Math.floor(index / 6);

    if (mensajes[mensajeIndex]) {
      const div = document.createElement("div");
      div.className = "mensaje";
      div.innerText = mensajes[mensajeIndex];
      galeria.appendChild(div);
    }
  }
});

</script>  
</body>  
</html>
