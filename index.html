<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0e0e0e;
  color: #f2f2f2;
  text-align: center;
  overflow-x: hidden;
}

header {
  padding: 60px 20px;
}

h1 {
  font-size: 2.8em;
  color: #ff6b81;
}

h2 {
  color: #bbb;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
}

.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.galeria img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

footer {
  margin: 40px 0;
  color: #888;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:white; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999;">
  <h1 id="introText" style="font-size:1.5em; padding:20px;"></h1>
</div>

<header>
  <h1>Nuestra historia 🐥❤️</h1>
  <h2>Kevin & Katherine</h2>
</header>

<div class="container">

  <div class="card">
    <h3>⏳ Nuestro tiempo juntos</h3>
    <div id="contador"></div>
  </div>

  <div class="card">
    <h3>💌 Nuestra historia</h3>
    <p>
      Este espacio es solo para nosotros… para guardar cada momento, cada risa y cada recuerdo juntos 💖
    </p>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>

</div>

<footer>
  Hecho con amor para mi pollito 🐥❤️
</footer>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">
  <img id="modalImg" style="max-width:90%; max-height:90%;">
</div>

<!-- MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusica()" style="position:fixed; bottom:20px; right:20px; background:#ff6b81; border:none; padding:10px; border-radius:50%;">
🎶
</button>

<script>
/* INTRO */
const textos = [
  "Hay historias que no se planean…",
  "pero llegan para cambiarlo todo…",
  "y tú… eres la mía 🐥❤️"
];

let i = 0;
const introText = document.getElementById("introText");

function mostrarTexto() {
  if (i < textos.length) {
    introText.style.opacity = 0;

    setTimeout(() => {
      introText.innerHTML = textos[i];
      introText.style.opacity = 1;
      i++;
      setTimeout(mostrarTexto, 2500);
    }, 500);
  } else {
    document.getElementById("intro").style.display = "none";
  }
}
mostrarTexto();

/* CONTADOR */
const fechaInicio = new Date("2025-10-13");

setInterval(() => {
  const ahora = new Date();
  const diff = ahora - fechaInicio;

  const dias = Math.floor(diff/(1000*60*60*24));
  document.getElementById("contador").innerHTML = dias + " días juntos 💖";
},1000);

/* GALERÍA AUTOMÁTICA */
fetch('https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos')
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById('galeria');

  data.forEach(file=>{
    if(file.type==="file"){
      const img=document.createElement('img');
      img.src=file.download_url;

      img.onclick=()=>{
        document.getElementById("modal").style.display="flex";
        document.getElementById("modalImg").src=img.src;
      };

      galeria.appendChild(img);
    }
  });
});

/* CERRAR MODAL */
document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").style.display="none";
};

/* MÚSICA */
let sonando=false;
const musica=document.getElementById("musica");

function toggleMusica(){
  if(sonando){musica.pause();}
  else{musica.play();}
  sonando=!sonando;
}

/* CORAZONES */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.innerHTML="💖";
  heart.style.position="fixed";
  heart.style.left=Math.random()*100+"vw";
  heart.style.bottom="0";
  heart.style.fontSize="20px";
  heart.style.animation="subir 4s linear";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
},500);
</script>

<style>
@keyframes subir{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-100vh);opacity:0;}
}
</style>

</body>
</html>
