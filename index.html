<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0e0e0e;
  color: #f2f2f2;
  text-align: center;
  overflow-x: hidden;
}

/* TITULO */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3em;
  color: #ff6b81;
}

/* NOMBRE ANIMADO */
.nombre {
  font-family: 'Great Vibes', cursive;
  font-size: 2em;
  color: #ffb3c1;
  opacity: 0;
  animation: aparecerNombre 3s ease forwards;
  animation-delay: 6s;
}

@keyframes aparecerNombre {
  from {opacity:0; transform: scale(0.8);}
  to {opacity:1; transform: scale(1);}
}

/* INTRO */
#intro {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition: opacity 1.5s ease;
}

#introText {
  font-family: 'Great Vibes', cursive;
  font-size: 2em;
  opacity: 0;
  transition: opacity 1s ease;
}

/* FADE */
#fadeScreen {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  opacity: 0;
  z-index:9998;
  transition: opacity 1.5s ease;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.galeria img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
}

/* CONTADOR */
#contador {
  font-size: 1.2em;
  color: #ffb3c1;
}

/* TEXTO BRILLO */
.brillo {
  position: relative;
  font-family: 'Great Vibes', cursive;
  font-size: 2em;
  color: #ff6b81;
  overflow: hidden;
}

.brillo::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
  animation: brillo 3s infinite;
}

@keyframes brillo {
  0% {left:-100%;}
  100% {left:100%;}
}

/* ESPACIO EXTRA */
.espacio {
  height: 120px;
}
</style>
</head>

<body>

<div id="intro">
  <h1 id="introText"></h1>
</div>

<div id="fadeScreen"></div>

<header>
  <h1>Nuestra historia 🐥❤️</h1>
  <h2 class="nombre">✨ Katherine ✨</h2>
</header>

<div class="container">

  <div class="card">
    <p>
      En este espacio que es solo para ti mi pollito y para mí, quedarán plasmadas nuestras historias y mejores momentos vividos 💖
    </p>
  </div>

  <div class="card">
    <h3>⏳ Nuestro tiempo juntos</h3>
    <div id="contador"></div>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>

</div>

<footer>
  <div class="brillo">
    ✨ Te Amo Mucho Mi Pollito Chitito Eres Lo Mejor De Mi Vida ❤️ ✨
  </div>
  <div class="espacio"></div>
</footer>

<div id="modal">
  <img id="modalImg">
</div>

<script>
/* INTRO */
const textos = [
  "Hay historias que no se planean…",
  "pero llegan para cambiarlo todo…",
  "y tú… eres la mía 🐥❤️"
];

let i = 0;
const introText = document.getElementById("introText");
const intro = document.getElementById("intro");
const fade = document.getElementById("fadeScreen");

function mostrarTexto() {
  if (i < textos.length) {
    introText.style.opacity = 0;

    setTimeout(() => {
      introText.innerText = textos[i];
      introText.style.opacity = 1;
      i++;
      setTimeout(mostrarTexto, 2500);
    }, 1000);
  } else {
    fade.style.opacity = 1;

    setTimeout(() => {
      intro.style.opacity = 0;

      setTimeout(() => {
        intro.style.display = "none";
        fade.style.opacity = 0;
      }, 1500);

    }, 1000);
  }
}

mostrarTexto();

/* CONTADOR */
const inicio = new Date("2025-10-13T00:00:00");

function actualizarContador() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff / (1000*60*60)) % 24);
  const minutos = Math.floor((diff / (1000*60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("contador").innerHTML =
    `${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos 💖`;
}

setInterval(actualizarContador,1000);
actualizarContador();

/* GALERIA */
const usuario = "feijookevin-bit";
const repo = "Proyecto-wrb";

fetch(`https://api.github.com/repos/${usuario}/${repo}/contents/fotos`)
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById("galeria");

  data.forEach(img=>{
    if(img.name.match(/\.(jpg|jpeg|png|webp)$/i)){
      let imagen = document.createElement("img");
      imagen.src = img.download_url;

      imagen.onclick = ()=>{
        document.getElementById("modal").style.display="flex";
        document.getElementById("modalImg").src=imagen.src;
      };

      galeria.appendChild(imagen);
    }
  });
});

/* MODAL */
document.getElementById("modal").onclick = ()=>{
  document.getElementById("modal").style.display="none";
};

/* MUSICA */
let audio = new Audio("musica.mp3");
audio.loop = true;

document.body.addEventListener("click", ()=>{
  if(!iniciada){
    audio.play();
    iniciada = true;
  }
});

/* CORAZONES Y POLLITOS SUAVES */
setInterval(()=>{
  const el = document.createElement("div");
  el.innerText = Math.random()>0.5 ? "💖":"🐥";

  el.style.position="fixed";
  el.style.left=Math.random()*100+"%";
  el.style.top="100vh";
  el.style.fontSize=(16+Math.random()*12)+"px";
  el.style.pointerEvents="none";
  el.style.transition="transform 8s linear, opacity 8s linear";

  document.body.appendChild(el);

  setTimeout(()=>{
    el.style.transform="translateY(-120vh)";
    el.style.opacity="0";
  },50);

  setTimeout(()=>el.remove(),8000);

},2000);
</script>

</body>
</html>
