<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Great Vibes', cursive;
  font-size: 20px;
  letter-spacing: 1px;
  background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
  color: #ff6b81;
  text-align: center;
  overflow-x: hidden;
}

/* VIDEO */
#video-bg {
  position: fixed;
  width:100%;
  height:100%;
  object-fit: cover;
  z-index:-2;
  opacity:0.2;
  filter: blur(2px);
}

/* TITULOS */
.titulo-principal { font-size:3.5em; }
.subtitulo { font-size:2.3em; opacity:0; animation:fadeIn 2s forwards; }

header p { font-size:1.4em; }

/* CARDS */
.container { max-width:900px; margin:auto; padding:20px; }
.card {
  background:#141414;
  border-radius:16px;
  padding:20px;
  margin:20px 0;
}

/* GALERIA */
.galeria {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}
.galeria img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:.4s;
}
.galeria img:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px rgba(255,107,129,0.8);
}

/* MENSAJES */
.mensaje {
  grid-column:1/-1;
  font-size:1.5em;
  color:#ffb3c1;
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

/* ESTRELLAS SUAVES */
.star-bg {
  position:fixed;
  color:white;
  opacity:0.2;
  pointer-events:none;
  animation:floatBg linear infinite;
}
@keyframes floatBg {
  0%{transform:translate(0,0);}
  100%{transform:translate(var(--x),var(--y));}
}

/* MODAL */
#modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
#modal img {
  max-width:90%;
  max-height:90%;
  border-radius:12px;
  animation:zoom .3s ease, neonPulse 2s infinite;
}
@keyframes zoom {
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}
@keyframes neonPulse {
  0%{box-shadow:0 0 10px #ff6b81;}
  50%{box-shadow:0 0 40px #ff6b81;}
  100%{box-shadow:0 0 10px #ff6b81;}
}

/* TEXTO FINAL */
#finalText { font-size:1.8em; margin-top:30px; }

/* POLLITO */
#pollito {
  width:120px;
  animation:latido 1.5s infinite;
}
@keyframes latido {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* INTRO */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.star {
  position:absolute;
  color:white;
  animation:floatStar linear infinite;
}
@keyframes floatStar {
  0%{transform:translate(0,0);}
  100%{transform:translate(var(--x),var(--y));}
}

/* 💖 CORAZONES */
.corazon-click {
  position:fixed;
  pointer-events:none;
  font-size:20px;
  animation:subirCorazon 2s forwards;
}
@keyframes subirCorazon {
  to{
    transform:translateY(-120px) scale(1.8);
    opacity:0;
  }
}

/* ✨ CHISPAS */
.chispa {
  position:fixed;
  width:4px;
  height:4px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  animation:chispaAnim 1s forwards;
}
@keyframes chispaAnim {
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

@keyframes fadeIn { to{opacity:1;} }
</style>
</head>

<body>

<video autoplay loop muted id="video-bg">
  <source src="viento.mp4">
</video>

<header>
  <h1 class="titulo-principal">Nuestra historia</h1>
  <h2 class="subtitulo">✨ Katherine ✨</h2>
  <p>Aquí quedarán plasmadas nuestras historias y mejores momentos vividos 💖</p>
</header>

<div class="container">
  <div class="card">
    <h3>⏳ Nuestro tiempo juntos ⌛</h3>
    <div id="contador"></div>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>
</div>

<footer>
  <div id="finalText"></div>
  <img id="pollito" src="fotos/pollito.png">
</footer>

<div id="modal"><img id="modalImg"></div>
<div id="intro"></div>

<script>

/* INTRO ESTRELLAS */
function crearEstrella(){
  const star=document.createElement("div");
  star.className="star";
  star.innerText="✨";
  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*100+"%";
  star.style.setProperty('--x',(Math.random()*200-100)+"vw");
  star.style.setProperty('--y',(Math.random()*200-100)+"vh");
  document.getElementById("intro").appendChild(star);
}
setInterval(crearEstrella,200);
setTimeout(()=>document.getElementById("intro").remove(),4000);

/* ESTRELLAS FONDO */
setInterval(()=>{
  const s=document.createElement("div");
  s.className="star-bg";
  s.innerText="✨";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.setProperty('--x',(Math.random()*100-50)+"vw");
  s.style.setProperty('--y',(Math.random()*100-50)+"vh");
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),20000);
},800);

/* GALERIA */
fetch("https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos")
.then(r=>r.json()).then(data=>{
  const g=document.getElementById("galeria");
  data.forEach(img=>{
    if(img.name.match(/\.(jpg|png|jpeg)$/)){
      let i=document.createElement("img");
      i.src=img.download_url;
      i.onclick=()=>{
        modal.style.display="flex";
        modalImg.src=i.src;
      };
      g.appendChild(i);
    }
  });
});

/* MODAL */
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");
modal.onclick=()=>modal.style.display="none";

/* CONTADOR */
const inicio=new Date("2025-10-13");
setInterval(()=>{
  const d=new Date()-inicio;
  document.getElementById("contador").innerHTML=
  Math.floor(d/86400000)+" días 💖";
},1000);

/* TEXTO FINAL */
const txt="Y si la vida me diera mil opciones… mil veces te elegiría a ti mi amor 🐥❤️";
let i=0;
window.addEventListener("scroll",()=>{
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-50){
    let inter=setInterval(()=>{
      if(i<txt.length){
        finalText.innerHTML+=txt[i++];
      }else clearInterval(inter);
    },50);
  }
});

/* 💖 + ✨ CLICK */
document.addEventListener("click", e=>{

  if(e.target.tagName==="IMG") return;

  /* corazones */
  const emojis=["💖","💘","💝","🐥"];
  const c=document.createElement("div");
  c.className="corazon-click";
  c.innerText=emojis[Math.floor(Math.random()*emojis.length)];
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),2000);

  /* chispas */
  for(let i=0;i<6;i++){
    const s=document.createElement("div");
    s.className="chispa";
    s.style.left=e.clientX+"px";
    s.style.top=e.clientY+"px";
    s.style.setProperty('--x',(Math.random()*100-50)+"px");
    s.style.setProperty('--y',(Math.random()*100-50)+"px");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }

});

</script>

</body>
</html>
