<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuente para todo -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Great Vibes', cursive;
  background: linear-gradient(to bottom, #0e0e0e, #1a1a1a);
  color: #ff6b81;
  text-align: center;
  overflow-x: hidden;
  position: relative;
}

/* Video de fondo tipo viento */
#video-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: -2;
  opacity: 0.25;
}

/* TITULO Y SUBTITULO */
.titulo-principal {
  font-family: 'Great Vibes', cursive;
  font-size: 3em;
  color: #ff6b81;
  margin-top: 40px;
}

.subtitulo {
  font-family: 'Great Vibes', cursive;
  font-size: 1.5em;
  color: #ff6b81;
  margin-top: 10px;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to {opacity:1;}
}

/* CONTENIDO */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
  position: relative;
  overflow: hidden;
  font-family: 'Great Vibes', cursive;
  color: #ff6b81;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  position: relative;
}

.galeria img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1;
  position: relative;
}

/* DESTELLOS DETRAS DE FOTOS */
.destello {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  border-radius: 50%;
  opacity: 0.8;
  animation: destelloAnim 3s linear infinite;
}

@keyframes destelloAnim {
  0% {transform: translate(0,0) scale(0);}
  50% {transform: translate(0,-20px) scale(1);}
  100% {transform: translate(0,-40px) scale(0);}
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#modal img {
  max-width:90%;
}

/* CONTADOR */
#contador {
  font-size: 1.2em;
  color: #ffb3c1;
}

/* FOOTER */
footer {
  margin: 40px 0 20px;
  position: relative;
}

.brillo {
  position: relative;
  font-family: 'Great Vibes', cursive;
  font-size: 2em;
  color: #ff6b81;
  overflow: hidden;
}

.espacio { height: 120px; }

/* CORAZONES Y POLLITOS */
</style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay loop muted id="video-bg">
  <source src="viento.mp4" type="video/mp4">
</video>

<header>
  <h1 class="titulo-principal">Nuestra historia</h1>
  <h2 class="subtitulo">✨ Katherine ✨</h2>
  <p>Aquí quedarán plasmadas nuestras historias y mejores momentos vividos 💖</p>
</header>

<div class="container">
  <div class="card">
    <h3>⏳ Nuestro tiempo juntos</h3>
    <div id="contador"></div>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>
</div>

<footer>
  <div class="brillo">
    ✨ Te Amo Mucho Mi Pollito Chitito Eres Lo Mejor De Mi Vida ❤️ ✨
  </div>
  <div class="espacio"></div>
</footer>

<div id="modal">
  <img id="modalImg">
</div>

<script>
/* INTRO */
const textos = [
  "Hay historias que no se planean…",
  "pero llegan para cambiarlo todo…",
  "y tú… eres la mía 🐥❤️"
];
let i = 0;
const introText = document.createElement("h1");
const intro = document.createElement("div");
intro.id = "intro";
intro.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 1.5s ease;";
document.body.prepend(intro);
intro.appendChild(introText);
introText.style.cssText = "font-family: 'Great Vibes', cursive; font-size:2em; color:#ff6b81; opacity:0; transition:opacity 1s ease;";

const fade = document.createElement("div");
fade.id = "fadeScreen";
fade.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:black;opacity:0;z-index:9998;transition:opacity 1.5s ease;";
document.body.prepend(fade);

function mostrarTexto() {
  if (i < textos.length) {
    introText.style.opacity = 0;
    setTimeout(() => {
      introText.innerText = textos[i];
      introText.style.opacity = 1;
      i++;
      setTimeout(mostrarTexto, 2500);
    }, 1000);
  } else {
    fade.style.opacity = 1;
    setTimeout(() => {
      intro.style.opacity = 0;
      setTimeout(() => { intro.remove(); fade.style.opacity = 0; },1500);
    }, 1000);
  }
}
mostrarTexto();

/* CONTADOR */
const inicio = new Date("2025-10-13T00:00:00");
function actualizarContador() {
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff / (1000*60*60)) % 24);
  const minutos = Math.floor((diff / (1000*60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("contador").innerHTML =
    `${dias} días, ${horas} horas, ${minutos} minutos y ${segundos} segundos 💖`;
}
setInterval(actualizarContador,1000);
actualizarContador();

/* GALERIA */
const usuario = "feijookevin-bit";
const repo = "Proyecto-wrb";

fetch(`https://api.github.com/repos/${usuario}/${repo}/contents/fotos`)
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById("galeria");

  data.forEach(img=>{
    if(img.name.match(/\.(jpg|jpeg|png|webp)$/i)){
      let imagen = document.createElement("img");
      imagen.src = img.download_url;
      imagen.onclick = ()=>{ document.getElementById("modal").style.display="flex"; document.getElementById("modalImg").src=imagen.src; };
      galeria.appendChild(imagen);
    }
  });

  // DESTELLOS DETRAS DE LAS FOTOS
  for(let i=0;i<30;i++){
    const d = document.createElement("div");
    d.className="destello";
    d.style.left = Math.random()*100+"%";
    d.style.top = Math.random()*140+"px";
    galeria.appendChild(d);
  }
});

/* MODAL */
document.getElementById("modal").onclick = ()=>{ document.getElementById("modal").style.display="none"; };

/* MUSICA */
let audio = new Audio("musica.mp3");
audio.loop = true;
let iniciada = false;
document.body.addEventListener("click", ()=>{
  if(!iniciada){ audio.play(); iniciada = true; }
});

/* CORAZONES Y POLLITOS */
setInterval(()=>{
  const el = document.createElement("div");
  el.innerText = Math.random()>0.5 ? "💖":"🐥";
  el.style.position="fixed";
  el.style.left=Math.random()*100+"%";
  el.style.top="100vh";
  el.style.fontSize=(16+Math.random()*12)+"px";
  el.style.pointerEvents="none";
  el.style.transition="transform 8s linear, opacity 8s linear";
  document.body.appendChild(el);
  setTimeout(()=>{ el.style.transform="translateY(-120vh)"; el.style.opacity="0"; },50);
  setTimeout(()=>el.remove(),8000);
},1500);
</script>

</body>
</html>
