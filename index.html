<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#0a0a0a,#1a1a1a);
color:#ffd1dc;
text-align:center;
overflow-x:hidden;
}

/* NEON SUAVE */
.neon{
text-shadow:0 0 5px #ff6b81,0 0 10px rgba(255,107,129,.5);
}

/* INTRO */
#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 1.5s;
}
#introText{
font-family:'Great Vibes',cursive;
font-size:2.2em;
color:#ff6b81;
opacity:0;
transition:opacity 1s;
text-align:center;
}

/* TITULOS */
h1{font-family:'Great Vibes';font-size:3em;margin-top:40px;}
h2{font-family:'Great Vibes';font-size:2em;}

/* TEXTO */
.presentacion{
font-size:1.1em;
margin-top:10px;
color:#ffb3c1;
}

/* CONTADOR */
.card{
background:#141414;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(255,107,129,.2);
}

/* GALERIA */
.galeria{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:10px;
padding:20px;
}
.galeria img{
width:100%;
height:140px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:all .5s cubic-bezier(0.22,1,0.36,1);
opacity:0;
transform:translateY(20px);
}
.galeria img.visible{
opacity:1;
transform:translateY(0);
}
.galeria img:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,107,129,.6);
}

.mensaje{
grid-column:1/-1;
color:#ffb3c1;
margin:10px;
opacity:0;
transform:translateY(20px);
transition:.6s;
}
.mensaje.visible{
opacity:1;
transform:translateY(0);
}

/* MODAL */
#modal{
display:none;
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
z-index:9999;
}
#modal img{
max-width:90%;
max-height:90%;
border-radius:12px;
animation:zoom .4s;
}
@keyframes zoom{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

/* SOBRE */
#sobre{
position:relative;
width:280px;
height:180px;
margin:60px auto;
cursor:pointer;
transition:.4s;
}
#sobre:hover{
transform:translateY(-5px);
}

.texto-sobre{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:4;
pointer-events:none;
color:white;
}

.tapa{
position:absolute;
width:100%;
height:100%;
background:#ff6b81;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:1s;
z-index:2;
}

.base{
position:absolute;
width:100%;
height:100%;
background:#ff4d6d;
border-radius:12px;
}

/* CARTA */
.carta{
position:absolute;
width:85%;
top:10%;
left:7.5%;

background:
linear-gradient(white, white) padding-box,
linear-gradient(45deg,#ffccd5,#ff6b81) border-box;

border:3px solid transparent;

color:#333;
border-radius:10px;
padding:25px;
transform:translateY(60px) scale(.95);
opacity:0;
transition:1s;
text-align:left;
line-height:1.6;
box-shadow:0 0 15px rgba(0,0,0,.2);
}
/* ABRIR */
#sobre.abierto .tapa{
transform:rotateX(180deg);
}
#sobre.abierto .carta{
transform:translateY(0) scale(1);
opacity:1;
}

/* FINAL */
.final{
margin:40px;
font-family:'Great Vibes';
font-size:1.6em;
}

/* POLLITO */
#pollito{
width:120px;
animation:float 3s ease-in-out infinite;
}
@keyframes float{
50%{transform:translateY(-8px);}
}
</style>
</head>

<body>

<div id="intro"><h1 id="introText"></h1></div>

<h1 class="neon">Nuestra historia</h1>
<h2 class="neon">✨ Katherine ✨</h2>

<div class="presentacion">
Aquí quedarán plasmadas nuestras historias y mejores momentos vividos 💖
</div>

<div class="card">
<h3>⏳ Nuestro tiempo juntos ⌛</h3>
<div id="contador"></div>
</div>

<div class="galeria" id="galeria"></div>

<footer>

<div id="sobre">
<div class="texto-sobre">Tócame 💖</div>
<div class="tapa"></div>
<div class="base"></div>
<div class="carta" id="cartaTexto"></div>
</div>

<img id="pollito" src="fotos/pollito.png">

<div class="final neon">
✨ Te Amo Mucho Mi Pollito Chitito Eres Lo Mejor De Mi Vida ❤️ ✨  
<br>y si la vida me diera a elegir... Te elegiría de nuevo una y mil veces 💖
</div>

</footer>

<div id="modal"><img id="modalImg"></div>

<script>

/* INTRO SUAVE */
const textos=["Hay historias que no se planean…","pero llegan para cambiarlo todo…","y tú… eres la mía 🐥❤️"];
let i=0;
function introAnim(){
const el=document.getElementById("introText");
if(i<textos.length){
el.style.opacity=0;
setTimeout(()=>{
el.innerText=textos[i++];
el.style.opacity=1;
setTimeout(introAnim,2500);
},800);
}else{
document.getElementById("intro").style.opacity=0;
setTimeout(()=>document.getElementById("intro").remove(),1500);
}
}
introAnim();

/* CONTADOR */
const inicio=new Date("2025-10-13");
setInterval(()=>{
const ahora=new Date();
const diff=ahora-inicio;
const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;
document.getElementById("contador").innerHTML=
`${d} días ${h}h ${m}m ${s}s 💖`;
},1000);

/* MENSAJES */
const mensajes=[
"lo repetiría mil veces",
"No sé cómo haces pero siempre me arreglas el día",
"uff… me gustas demasiado",
"Contigo todo se siente de película",
"Te Adoro Mi Princesa",
"No es la foto… eres tú en ella",
"Literal, mi lugar favorito eres tú",
"Siempre termino sonriendo cuando veo nuestras historias"
];

/* GALERIA */
fetch("https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos")
.then(r=>r.json())
.then(data=>{
const galeria=document.getElementById("galeria");

const imgs=data.filter(f=>/\.(jpg|png|jpeg|webp)$/i.test(f.name) && f.name!=="pollito.png");

imgs.forEach((f,i)=>{
const img=document.createElement("img");
img.src=f.download_url;

setTimeout(()=>img.classList.add("visible"),100*i);

img.onclick=()=>abrirModal(img.src);
galeria.appendChild(img);

if((i+1)%6===0){
const m=mensajes[Math.floor(i/6)];
if(m){
const div=document.createElement("div");
div.className="mensaje";
div.innerText=m;
setTimeout(()=>div.classList.add("visible"),100*i);
galeria.appendChild(div);
}
}
});
});

/* MODAL */
function abrirModal(src){
const modal=document.getElementById("modal");
document.getElementById("modalImg").src=src;
modal.style.display="flex";
modal.onclick=()=>modal.style.display="none";
}

/* CARTA */
const textoCarta=`Mi amor… no fue planeado, pero llegaste y cambiaste todo.
Hoy puedo decir que eres mi paz en medio de todo, mi alegría en los días simples…
y la persona con la que quiero seguir escribiendo esta historia 🐥❤️`;

let ci=0;

function escribirCarta(){
  const el=document.getElementById("cartaTexto");

  if(ci<textoCarta.length){
    el.innerHTML+=textoCarta[ci++];
    setTimeout(escribirCarta,30 + Math.random()*40);
  }
}

let cartaAbierta = false;

document.getElementById("sobre").onclick=()=>{
  if(cartaAbierta) return;

  cartaAbierta = true;
  document.getElementById("sobre").classList.add("abierto");
  setTimeout(escribirCarta,600);
};

/* 🌫️ 70% POLVO DE LUZ */
setInterval(()=>{
  const p=document.createElement("div");

  p.style.position="fixed";
  p.style.width="3px";
  p.style.height="3px";
  p.style.background="rgba(255,182,193,0.5)";
  p.style.borderRadius="50%";
  p.style.left=Math.random()*100+"%";
  p.style.bottom="0";
  p.style.pointerEvents="none";
  p.style.filter="blur(1px)";

  p.style.transition="transform 10s linear, opacity 10s";

  document.body.appendChild(p);

  setTimeout(()=>{
    p.style.transform="translateY(-120vh)";
    p.style.opacity="0";
  },50);

  setTimeout(()=>p.remove(),10000);

},400); // puedes subir a 500 si quieres más fluido


/* ✨ 20% DESTELLOS SUAVES */
setInterval(()=>{
  const d=document.createElement("div");

  d.style.position="fixed";
  d.style.width="4px";
  d.style.height="4px";
  d.style.background="white";
  d.style.borderRadius="50%";
  d.style.left=Math.random()*100+"%";
  d.style.top=Math.random()*100+"%";
  d.style.opacity="0";
  d.style.pointerEvents="none";
  d.style.boxShadow="0 0 10px #fff";

  document.body.appendChild(d);

  setTimeout(()=>d.style.opacity="1",50);
  setTimeout(()=>d.style.opacity="0",800);
  setTimeout(()=>d.remove(),1200);

},900);


/* 💖 10% CORAZONES ELEGANTES */
setInterval(()=>{
  if(Math.random()>0.1) return; // pocos corazones

  const c=document.createElement("div");
  c.innerText="💖";

  c.style.position="fixed";
  c.style.left=Math.random()*100+"%";
  c.style.bottom="0";
  c.style.fontSize="16px";
  c.style.opacity="0.7";
  c.style.pointerEvents="none";

  c.style.transition="transform 6s linear, opacity 6s";

  document.body.appendChild(c);

  setTimeout(()=>{
    c.style.transform="translateY(-100vh)";
    c.style.opacity="0";
  },50);

  setTimeout(()=>c.remove(),6000);

},1200);

</script>

</body>
</html>
