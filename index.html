<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0e0e0e;
  color: #f2f2f2;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8em;
  color: #ff6b81;
}

/* INTRO */
#intro {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition: opacity 1.5s ease;
}

#introText {
  font-family: 'Playfair Display', serif;
  font-size: 1.6em;
  opacity: 0;
  transition: opacity 1s ease;
  padding: 20px;
}

/* PANTALLA NEGRA TRANSICIÓN */
#fadeScreen {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  opacity: 0;
  z-index:9998;
  pointer-events:none;
  transition: opacity 1.5s ease;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.galeria img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
  max-height:90%;
}

/* BOTON MUSICA */
button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff6b81;
  border: none;
  padding: 12px;
  border-radius: 50%;
  color: white;
  font-size: 18px;
}

/* TE AMO */
#teamo {
  font-family: 'Playfair Display', serif;
  font-size: 2.5em;
  color: #ff6b81;
  margin-top: 10px;
  text-shadow: 0 0 15px rgba(255,107,129,0.6);
  animation: latido 2s infinite;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* FLOTANTES */
@keyframes subir {
  from {transform: translateY(0); opacity:1;}
  to {transform: translateY(-100vh); opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1 id="introText"></h1>
</div>

<!-- PANTALLA NEGRA -->
<div id="fadeScreen"></div>

<header>
  <h1>Nuestra historia 🐥❤️</h1>
</header>

<div class="container">

  <div class="card">
    <h3>💌 Nuestra historia</h3>
    <p>Este espacio es solo para nosotros 💖</p>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>

</div>

<footer>
  Hecho con amor para mi pollito 🐥❤️
  <div id="teamo">TE AMO ❤️</div>
</footer>

<div id="modal">
  <img id="modalImg">
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusica()">🎶</button>

<script>
/* INTRO + TRANSICIÓN PRO */
const textos = [
  "Hay historias que no se planean…",
  "pero llegan para cambiarlo todo…",
  "y tú… eres la mía 🐥❤️"
];

let i = 0;
const introText = document.getElementById("introText");
const intro = document.getElementById("intro");
const fade = document.getElementById("fadeScreen");

function mostrarTexto() {
  if (i < textos.length) {
    introText.style.opacity = 0;

    setTimeout(() => {
      introText.innerText = textos[i];
      introText.style.opacity = 1;
      i++;
      setTimeout(mostrarTexto, 2500);
    }, 1000);
  } else {
    // 👉 fade a negro
    fade.style.opacity = 1;

    setTimeout(() => {
      intro.style.opacity = 0;

      setTimeout(() => {
        intro.style.display = "none";

        // 👉 quitar negro poco a poco
        fade.style.opacity = 0;
      }, 1500);

    }, 800);
  }
}

mostrarTexto();

/* GALERIA AUTOMATICA */
fetch('https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos')
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById('galeria');

  data.forEach(file=>{
    if(file.type==="file"){
      const img=document.createElement('img');
      img.src=file.download_url;

      img.onclick=()=>{
        document.getElementById("modal").style.display="flex";
        document.getElementById("modalImg").src=img.src;
      };

      galeria.appendChild(img);
    }
  });
});

/* MODAL */
document.getElementById("modal").onclick = () => {
  document.getElementById("modal").style.display="none";
};

/* MUSICA */
const musica = document.getElementById("musica");

function toggleMusica(){
  if(musica.paused){
    musica.play();
  } else {
    musica.pause();
  }
}

document.body.addEventListener("click", () => {
  musica.play();
}, { once: true });

/* ANIMACION SUAVE (ARREGLADA) */
setInterval(()=>{
  let elemento = document.createElement("div");

  elemento.innerText = Math.random() > 0.5 ? "💖" : "🐥";

  elemento.style.position="fixed";
  elemento.style.left=Math.random()*100+"%";
  elemento.style.bottom="-20px";
  elemento.style.fontSize=(18+Math.random()*15)+"px";
  elemento.style.pointerEvents="none";
  elemento.style.animation="subir 8s linear";

  document.body.appendChild(elemento);

  setTimeout(()=>elemento.remove(),8000);
},1500);
</script>

</body>
</html>
