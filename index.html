<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 🐥❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0e0e0e;
  color: #f2f2f2;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8em;
  color: #ff6b81;
}

/* INTRO */
#intro {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition: opacity 1.5s ease;
}

#introText {
  font-family: 'Playfair Display', serif;
  font-size: 1.6em;
  opacity: 0;
  transition: opacity 1s ease;
  padding: 20px;
}

/* FADE */
#fadeScreen {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  opacity: 0;
  z-index:9998;
  pointer-events:none;
  transition: opacity 1.5s ease;
}

/* CONTENIDO */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}

.galeria img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.galeria img:hover {
  transform: scale(1.05);
}

/* MODAL */
#modal {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#modal img {
  max-width:90%;
  max-height:90%;
}

/* BOTON */
button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff6b81;
  border: none;
  padding: 12px;
  border-radius: 50%;
  color: white;
  font-size: 18px;
}

/* TE AMO */
#teamo {
  font-family: 'Playfair Display', serif;
  font-size: 2.5em;
  color: #ff6b81;
  margin-top: 10px;
  text-shadow: 0 0 15px rgba(255,107,129,0.6);
  animation: latido 2s infinite;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div id="intro">
  <h1 id="introText"></h1>
</div>

<div id="fadeScreen"></div>

<header>
  <h1>Nuestra historia 🐥❤️</h1>
</header>

<div class="container">
  <div class="card">
    <h3>💌 Nuestra historia</h3>
    <p>Este espacio es solo para nosotros 💖</p>
  </div>

  <div class="card">
    <h3>📸 Nuestros recuerdos</h3>
    <div class="galeria" id="galeria"></div>
  </div>
</div>

<footer>
  Hecho con amor para mi pollito 🐥❤️
  <div id="teamo">TE AMO ❤️</div>
</footer>

<div id="modal">
  <img id="modalImg">
</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusica()">🎶</button>

<script>
/* INTRO */
const textos = [
  "Hay historias que no se planean…",
  "pero llegan para cambiarlo todo…",
  "y tú… eres la mía 🐥❤️"
];

let i = 0;
const introText = document.getElementById("introText");
const intro = document.getElementById("intro");
const fade = document.getElementById("fadeScreen");

function mostrarTexto() {
  if (i < textos.length) {
    introText.style.opacity = 0;

    setTimeout(() => {
      introText.innerText = textos[i];
      introText.style.opacity = 1;
      i++;
      setTimeout(mostrarTexto, 2500);
    }, 1000);
  } else {
    fade.style.opacity = 1;

    setTimeout(() => {
      intro.style.opacity = 0;

      setTimeout(() => {
        intro.style.display = "none";
        fade.style.opacity = 0;
      }, 1500);

    }, 800);
  }
}
mostrarTexto();

/* GALERIA ROBUSTA */
fetch('https://api.github.com/repos/feijookevin-bit/Proyecto-wrb/contents/fotos')
.then(res=>res.json())
.then(data=>{
  const galeria = document.getElementById('galeria');

  if(!Array.isArray(data)) return;

  data
    .filter(f => f.type==="file" && /\.(jpg|jpeg|png|webp)$/i.test(f.name))
    .sort((a,b)=>{
      const na = parseInt(a.name);
      const nb = parseInt(b.name);
      return (isNaN(na)||isNaN(nb)) 
        ? a.name.localeCompare(b.name)
        : na - nb;
    })
    .forEach(file=>{
      const img = document.createElement('img');
      img.src = file.download_url;

      img.onerror = () => img.remove();

      img.onclick = ()=>{
        document.getElementById("modal").style.display="flex";
        document.getElementById("modalImg").src = img.src;
      };

      galeria.appendChild(img);
    });
})
.catch(()=> console.log("Error cargando imágenes"));

/* MODAL */
document.getElementById("modal").onclick = () => {
  document.getElementById("modal").style.display="none";
};

/* MUSICA */
const musica = document.getElementById("musica");

function toggleMusica(){
  if(musica.paused){
    musica.play().catch(()=>{});
  } else {
    musica.pause();
  }
}

document.body.addEventListener("click", () => {
  musica.play().catch(()=>{});
}, { once: true });

/* ANIMACION ULTRA SUAVE */
setInterval(()=>{
  const el = document.createElement("div");

  el.innerText = Math.random() > 0.5 ? "💖" : "🐥";

  el.style.position = "fixed";
  el.style.left = Math.random()*100+"%";
  el.style.top = "100vh";
  el.style.fontSize = (16 + Math.random()*10)+"px";
  el.style.pointerEvents = "none";
  el.style.willChange = "transform, opacity";

  el.style.transform = "translateY(0)";
  el.style.transition = "transform 10s linear, opacity 10s linear";

  document.body.appendChild(el);

  setTimeout(()=>{
    el.style.transform = "translateY(-120vh)";
    el.style.opacity = "0";
  },50);

  setTimeout(()=> el.remove(), 10000);

}, 2500);
</script>

</body>
</html>
